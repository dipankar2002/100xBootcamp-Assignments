<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VS Code Bottom Bar</title>
    <style>
        body {
            margin: 0;
            background-color: #0a0a0a;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 56px 24px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 48px;
            align-items: start;
        }

        .left h2 {
            margin: 0;
            font-size: 48px;
            line-height: 1.05;
            font-weight: 700;
            margin-bottom: 22px;
        }

        .left p {
            margin: 0;
            max-width: 460px;
            color: #9ba3b4;
            font-size: 18px;
            line-height: 1.7;
        }

        .languagePanel {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 26px 34px;
        }

        .language {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 600;
            white-space: nowrap;
        }

        .language img {
            width: 24px;
            height: 24px;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }

            .left h2 {
                font-size: 38px;
            }
        }
    </style>
</head>

<body>
    <section class="container">
        <div class="left">
            <h2>Code in any language</h2>
            <p>
                VS Code supports almost every major programming language. Several ship in the box, like JavaScript,
                TypeScript, CSS, and HTML, but extensions for others can be found in the VS Code Marketplace.
            </p>
        </div>
        <div class="languagePanel">
            <div class="language"><img src="https://code.visualstudio.com/assets/home/language-js.png" alt="JavaScript">JavaScript</div>
            <div class="language"><img src="https://code.visualstudio.com/assets/home/language-ts.png" alt="TypeScript">TypeScript</div>
            <div class="language"><img src="https://code.visualstudio.com/assets/home/language-python.png" alt="Python">Python</div>
            <div class="language"><img src="https://code.visualstudio.com/assets/home/language-cs.png" alt="C#">C#</div>
            <div class="language"><img src="https://code.visualstudio.com/assets/home/language-cpp.png" alt="C++">C++</div>
            <div class="language"><img src="https://code.visualstudio.com/assets/home/language-html.png" alt="HTML">HTML</div>
            <div class="language"><img src="https://code.visualstudio.com/assets/home/language-java.png" alt="Java">Java</div>
            <div class="language"><img src="https://code.visualstudio.com/assets/home/language-json.png" alt="JSON">JSON</div>
            <div class="language"><img src="https://code.visualstudio.com/assets/home/language-php.png" alt="PHP">PHP</div>
            <div class="language"><img src="https://code.visualstudio.com/assets/home/language-markdown.png" alt="Markdown">Markdown</div>
            <div class="language"><img src="https://code.visualstudio.com/assets/home/language-powershell.png" alt="Powershell">Powershell</div>
            <div class="language"><img src="https://code.visualstudio.com/assets/home/language-yaml.png" alt="YAML">YAML</div>
        </div>
    </section>
</body>

</html>
