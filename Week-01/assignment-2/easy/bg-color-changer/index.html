<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BG Color Changer</title>
    <style>
        :root {
            --panel: #ffffff;
            --text: #17212b;
            --muted: #4f5d70;
            --accent: #2f6fed;
            --border: #d7deea;
            --bg: #f3f6fb;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 10% 10%, #f7faff, #e4edf8 45%, #d3e0f2);
            color: var(--text);
            display: grid;
            place-items: center;
            transition: background-color 0.25s ease;
        }

        .app {
            width: min(900px, 92vw);
            background: color-mix(in srgb, var(--panel) 94%, transparent);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            backdrop-filter: blur(4px);
            box-shadow: 0 24px 60px rgba(9, 25, 58, 0.12);
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(1.6rem, 2.4vw, 2.2rem);
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .controls {
            margin-top: 22px;
            display: grid;
            gap: 16px;
        }

        .swatches {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .swatch {
            border: 0;
            border-radius: 999px;
            padding: 10px 16px;
            min-width: 100px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
            text-transform: capitalize;
        }

        .swatch:focus-visible,
        .add-btn:focus-visible,
        input:focus-visible {
            outline: 3px solid #8db4ff;
            outline-offset: 1px;
        }

        .custom {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            min-width: 250px;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
        }

        .add-btn {
            border: 0;
            border-radius: 10px;
            background: var(--accent);
            color: white;
            padding: 12px 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }

        .status {
            min-height: 24px;
            color: #0f4f1f;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <main class="app">
        <h1>Background Color Changer</h1>
        <p>Pick a color from the panel or add your own color value (name, hex, rgb, hsl).</p>

        <section class="controls">
            <div id="swatches" class="swatches"></div>

            <div class="custom">
                <input id="customColor" type="text" placeholder="Try: coral or #ff6b6b or rgb(20,150,255)" />
                <button id="addBtn" class="add-btn" type="button">Add color</button>
            </div>

            <div id="status" class="status" aria-live="polite"></div>
        </section>
    </main>

    <script>
        const swatchesContainer = document.getElementById("swatches");
        const statusEl = document.getElementById("status");
        const customInput = document.getElementById("customColor");
        const addBtn = document.getElementById("addBtn");

        const colors = ["red", "blue", "green", "orange", "slateblue", "black", "goldenrod"];

        function updateStatus(message) {
            statusEl.textContent = message;
        }

        function isValidColor(value) {
            const test = document.createElement("span");
            test.style.color = "";
            test.style.color = value;
            return test.style.color !== "";
        }

        function getTextColor(bg) {
            const sample = document.createElement("div");
            sample.style.color = bg;
            document.body.appendChild(sample);
            const rgb = getComputedStyle(sample).color;
            sample.remove();

            const numbers = rgb.match(/\d+/g);
            if (!numbers || numbers.length < 3) {
                return "#fff";
            }

            const [r, g, b] = numbers.map(Number);
            const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            return luminance > 0.62 ? "#102134" : "#ffffff";
        }

        function applyBackground(color) {
            document.body.style.background = color;
            updateStatus(`Background changed to ${color}`);
        }

        function renderSwatches() {
            swatchesContainer.innerHTML = "";
            colors.forEach((color) => {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = "swatch";
                btn.textContent = color;
                btn.style.backgroundColor = color;
                btn.style.color = getTextColor(color);
                btn.addEventListener("click", () => applyBackground(color));
                swatchesContainer.appendChild(btn);
            });
        }

        addBtn.addEventListener("click", () => {
            const value = customInput.value.trim();
            if (!value) {
                updateStatus("Enter a color before adding.");
                return;
            }

            if (!isValidColor(value)) {
                updateStatus("That is not a valid CSS color value.");
                return;
            }

            if (!colors.includes(value.toLowerCase())) {
                colors.push(value.toLowerCase());
                renderSwatches();
            }

            customInput.value = "";
            applyBackground(value);
        });

        customInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                addBtn.click();
            }
        });

        renderSwatches();
    </script>
</body>

</html>
