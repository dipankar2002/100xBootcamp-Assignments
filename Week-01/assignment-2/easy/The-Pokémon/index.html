<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Pokemon</title>
    <style>
        :root {
            --bg: #f4f7fe;
            --panel: #ffffff;
            --text: #132039;
            --muted: #55657f;
            --accent: #2f6ced;
            --border: #d4deef;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 10% 10%, #eef3ff, #e2eafb 50%, #d5e0f5);
            color: var(--text);
            min-height: 100vh;
        }

        .wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.6rem, 2.4vw, 2.3rem);
        }

        .sub {
            margin: 8px 0 0;
            color: var(--muted);
        }

        .controls {
            margin-top: 20px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: end;
        }

        label {
            display: grid;
            gap: 6px;
            font-size: 0.9rem;
            color: var(--muted);
        }

        input,
        select {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            min-width: 170px;
            font-size: 0.95rem;
            background: #fff;
        }

        button {
            border: 0;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            border-radius: 10px;
            padding: 11px 16px;
            cursor: pointer;
        }

        .status {
            margin-top: 12px;
            color: var(--muted);
            min-height: 24px;
            font-weight: 600;
        }

        .grid {
            margin-top: 18px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 14px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px;
        }

        .card img {
            display: block;
            width: 130px;
            height: 130px;
            object-fit: contain;
            margin: 0 auto 8px;
        }

        .name {
            margin: 0;
            text-transform: capitalize;
            font-size: 1.1rem;
        }

        .meta {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .types {
            margin-top: 10px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .chip {
            background: #e8f0ff;
            color: #2052bf;
            border-radius: 999px;
            padding: 4px 9px;
            font-size: 0.8rem;
            text-transform: capitalize;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <h1>The Pokemon</h1>
        <p class="sub">Choose how many cards to load and optionally filter by category (pokemon type).</p>

        <div class="controls">
            <label>
                Number of cards
                <input id="countInput" type="number" min="1" max="20" value="6" />
            </label>

            <label>
                Category
                <select id="typeSelect">
                    <option value="any">Any</option>
                    <option value="fire">Fire</option>
                    <option value="water">Water</option>
                    <option value="grass">Grass</option>
                    <option value="electric">Electric</option>
                    <option value="psychic">Psychic</option>
                    <option value="dragon">Dragon</option>
                    <option value="normal">Normal</option>
                    <option value="fighting">Fighting</option>
                    <option value="ground">Ground</option>
                    <option value="ice">Ice</option>
                </select>
            </label>

            <button id="loadBtn" type="button">Load Pokemon</button>
        </div>

        <div id="status" class="status" aria-live="polite"></div>
        <section id="grid" class="grid"></section>
    </div>

    <script>
        const MAX_ID = 1025;
        const countInput = document.getElementById("countInput");
        const typeSelect = document.getElementById("typeSelect");
        const loadBtn = document.getElementById("loadBtn");
        const statusEl = document.getElementById("status");
        const grid = document.getElementById("grid");

        function setStatus(text) {
            statusEl.textContent = text;
        }

        function randomId() {
            return Math.floor(Math.random() * MAX_ID) + 1;
        }

        function hasType(pokemon, type) {
            return pokemon.types.some((entry) => entry.type.name === type);
        }

        function renderCard(pokemon) {
            const card = document.createElement("article");
            card.className = "card";

            const image = pokemon.sprites.other["official-artwork"].front_default || pokemon.sprites.front_default;

            card.innerHTML = `
                <img src="${image}" alt="${pokemon.name}" />
                <h3 class="name">${pokemon.name}</h3>
                <p class="meta">#${String(pokemon.id).padStart(3, "0")}</p>
                <div class="types"></div>
            `;

            const typesWrap = card.querySelector(".types");
            pokemon.types.forEach((entry) => {
                const chip = document.createElement("span");
                chip.className = "chip";
                chip.textContent = entry.type.name;
                typesWrap.appendChild(chip);
            });

            return card;
        }

        async function fetchPokemon(id) {
            const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
            if (!response.ok) {
                throw new Error("Failed to fetch pokemon");
            }
            return response.json();
        }

        async function loadPokemon() {
            const count = Number(countInput.value);
            const selectedType = typeSelect.value;

            if (!Number.isInteger(count) || count < 1 || count > 20) {
                setStatus("Choose a number between 1 and 20.");
                return;
            }

            setStatus("Loading pokemon cards...");
            grid.innerHTML = "";

            const seen = new Set();
            const selected = [];
            const maxAttempts = count * 45;
            let attempts = 0;

            while (selected.length < count && attempts < maxAttempts) {
                attempts += 1;
                const id = randomId();
                if (seen.has(id)) continue;

                try {
                    const pokemon = await fetchPokemon(id);
                    if (selectedType === "any" || hasType(pokemon, selectedType)) {
                        selected.push(pokemon);
                    }
                    seen.add(id);
                } catch (error) {
                    continue;
                }
            }

            if (selected.length === 0) {
                setStatus("No pokemon found for this filter. Try another category.");
                return;
            }

            selected.forEach((pokemon) => grid.appendChild(renderCard(pokemon)));
            setStatus(`Loaded ${selected.length} pokemon card(s).`);
        }

        loadBtn.addEventListener("click", loadPokemon);
        loadPokemon();
    </script>
</body>

</html>
